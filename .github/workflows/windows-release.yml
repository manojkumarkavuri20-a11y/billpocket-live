name: Build Windows app

# Builds the BillPocket Windows installers (.msi via WiX + .exe via NSIS).
# Triggered automatically when a `v*` tag is pushed; can also be run by hand
# from the Actions tab via workflow_dispatch.
#
# The first time you push a `v*` tag, this job:
#   1. Generates Tauri icons from icons/icon.svg
#   2. Builds the Rust + Tauri release binary on windows-latest
#   3. Packages MSI and NSIS installers
#   4. Creates a GitHub Release and attaches both installers
#
# Cost to publish: £0 — no Apple/Google developer accounts, no signing key
# required. Users will see a SmartScreen "unrecognised publisher" warning on
# first install; that goes away once you buy a code-signing certificate
# (~£200/yr) and add it to the repo secrets.

on:
  push:
    # 'v*' tag pushes produce a proper GitHub Release with installers attached.
    # main-branch pushes that touch the Tauri scaffold or its CI build the
    # installer as workflow artifacts so iteration doesn't require a tag.
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "src-tauri/**"
      - "icons/**"
      - ".github/workflows/windows-release.yml"
      - "index.html"
      - "styles.css"
      - "sw.js"
      - "manifest.webmanifest"
      - "js/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Generate Tauri icon set from icons/icon.svg
        run: npx @tauri-apps/cli icon icons/icon.svg --output src-tauri/icons

      - name: Assemble web dist for Tauri
        # Tauri 2 refuses a frontendDist that contains src-tauri/, so we copy
        # just the web assets into a clean dist/ folder before building.
        shell: bash
        run: |
          mkdir -p dist
          cp -r index.html styles.css manifest.webmanifest sw.js icons js dist/

      - name: Build BillPocket for Windows
        run: npx @tauri-apps/cli build
        working-directory: src-tauri

      - name: Locate installers
        id: artifacts
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter "*.msi" -ErrorAction SilentlyContinue
          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($msi) { echo "msi=$($msi.FullName)" >> $env:GITHUB_OUTPUT }
          if ($nsis) { echo "nsis=$($nsis.FullName)" >> $env:GITHUB_OUTPUT }
          echo "MSI: $($msi.FullName)"
          echo "NSIS: $($nsis.FullName)"

      - name: Upload artefacts (for non-tag workflow_dispatch runs)
        uses: actions/upload-artifact@v4
        with:
          name: billpocket-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Create GitHub Release with installers
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
